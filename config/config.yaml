# Dataset settings
dataset:
  raw_zip_path: "../wtp4ssmwsd-1/obj.zip" # Relative to config run dir
  extract_dir: "data/extracted"
  train_split: 0.7
  val_split: 0.2
  test_split: 0.1
  data_yaml_path: "data/master_dataset.yaml"

# YOLO Model parameters
model:
  name: "yolov8s.pt"  # Using small model for speed-precision balance on 2.5GB data
  image_size: 640
  batch_size: 16        # Safe for most GPUs; increase to 32 if you have >8GB VRAM
  epochs: 30            # Fewer epochs needed with large data and frozen backbone
  confidence_threshold: 0.30  
  iou_threshold: 0.45
  patience: 10          # Faster early stopping
  learning_rate: 0.001
  weight_decay: 0.0005
  classes: [0, 1, 2, 3, 6] # Custom dataset: car, motorcycle, bus, truck, van

# Camera & ROI Parameters
camera:
  # Relative ROI polygon coordinates [x, y] (0.0 to 1.0)
  # This covers the main road area.
  roi_points: [[0.1, 0.95], [0.9, 0.95], [0.7, 0.3], [0.3, 0.3]]
  road_length_meters: 120.0 # Adjusted to cover more of the road line

# Cell Transmission Model (CTM) Parameters
ctm:
  cell_length_meters: 20.0 
  time_step_seconds: 1.0   
  free_flow_speed_m_s: 15.0 
  jam_density_veh_m: 0.15   
  max_flow_veh_s: 0.5       
  congestion_threshold: 0.08 

# Visualization settings
visualization:
  bbox_color: [0, 255, 0] 
  text_color: [255, 255, 255]
  roi_color: [255, 0, 0]
  density_overlay: true
  show_ids: true
  show_roi: false  # HIDDEN: Removes the "trapeze" from the screen
  congestion_colors:
    free_flow: [0, 255, 0] 
    heavy_traffic: [0, 165, 255] 
    jam: [0, 0, 255] 
